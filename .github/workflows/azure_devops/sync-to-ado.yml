name: Sync to Azure DevOps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

stages:
  - name: ValidateToken
    jobs:
      - name: Validate Azure DevOps PAT
        runs-on: ubuntu-latest
        env:
          AZURE_DEVOPS_URL: ${{ vars.AZURE_DEVOPS_URL }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}
        steps:
          - name: Verify PAT with Azure DevOps REST API
            run: |
              echo "=== PAT validation start ==="
              echo "Checking token against Azure DevOps..."
              org=$(echo $AZURE_DEVOPS_URL | cut -d'/' -f2)
              echo "Detected organization: $org"
              status=$(curl -s -o /dev/null -w "%{http_code}" -u :$AZURE_DEVOPS_PAT "https://dev.azure.com/$org/_apis/projects?api-version=6.0")
              echo "API response status: $status"
              if [ "$status" -ne 200 ]; then
                echo "PAT validation failed (HTTP $status). Ensure the token is valid and has Code permissions."
                exit 1
              fi
              echo "PAT appears valid."
              echo "=== PAT validation end ==="

  - name: Mirror
    needs: ValidateToken
    jobs:
      - name: Mirror GitHub ➜ Azure DevOps
        runs-on: ubuntu-latest
        env:
          # The URL of the Azure DevOps repo (omit the leading "https://").
          # Set this value as a repository variable named AZURE_DEVOPS_URL
          # In GitHub: Settings → Variables → Repository variables
          # Example format: dev.azure.com/myorg/MyProject/_git/CorpoInfrastructure
          AZURE_DEVOPS_URL: ${{ vars.AZURE_DEVOPS_URL }}
          AZURE_DEVOPS_PAT: ${{ secrets.AZURE_DEVOPS_PAT }}

        steps:
          - name: Checkout repository
            uses: actions/checkout@v3
            with:
              fetch-depth: 0       # fetch all history for mirroring

          - name: Configure Git
            run: |
              echo "=== configuring git user ==="
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              echo "=== git configured ==="
              echo "git config list:"
              git config --list

          - name: Add Azure DevOps remote
            run: |
              echo "=== adding azure remote ==="
              git remote add azure https://${{ env.AZURE_DEVOPS_PAT }}@${{ env.AZURE_DEVOPS_URL }}
              git remote -v
              echo "=== azure remote added ==="
              echo "validate remote show:"
              git remote show azure

          - name: Push all refs to Azure DevOps
            run: |
              echo "=== pushing all refs to azure ==="
              git push --mirror azure
              rc=$?
              echo "push exit code: $rc"
              if [ $rc -ne 0 ]; then
                echo "push failed"
                exit $rc
              fi
              echo "=== push completed ==="

          - name: Cleanup
            run: |
              echo "=== cleaning up ==="
              git remote remove azure
              echo "=== cleanup done ==="
              echo "current remotes after cleanup:"
              git remote -v

# --------------------------------------------------------------
# NOTES:
# - Create an Azure DevOps PAT and store it in GitHub Secrets as
#     AZURE_DEVOPS_PAT
# - The PAT must have Code (read & write) permissions on the target repo.
# - This workflow runs on every push to 'main' and can be triggered manually.
# - You may adjust triggers or branch names as needed.
# - It mirrors the GitHub repo state to Azure DevOps, overwriting history.
# --------------------------------------------------------------