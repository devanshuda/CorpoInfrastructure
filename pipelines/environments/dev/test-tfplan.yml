pool:
  vmImage: 'ubuntu-latest'

variables:
  # Terraform Version
  terraformVersion: '1.15.2'

  # Terraform Working Directory
  tfWorkingDir: '$(Build.SourcesDirectory)/scripts/terraform/infra-azure/environments/dev'

stages:

# =============================================================================
# TERRAFORM PLAN STAGE
# =============================================================================
- stage: Terraform_Plan
  displayName: 'Terraform Plan - Corpo Dev'

  jobs:
  - job: TerraformPlan
    displayName: 'Generate Terraform Plan for Corpo Dev'

    variables:
    - group: 'dev'

    steps:

    # -------------------------------------------------------------------------
    # Checkout Repository
    # -------------------------------------------------------------------------
    - checkout: self
      fetchDepth: 0
      displayName: 'Checkout Source Code'

    # -------------------------------------------------------------------------
    # Install Terraform
    # -------------------------------------------------------------------------
    - task: TerraformInstaller@1
      displayName: 'Install Terraform'
      inputs:
        terraformVersion: $(terraformVersion)

    # -------------------------------------------------------------------------
    # Terraform Init / Validate / Plan
    # -------------------------------------------------------------------------
    - task: AzureCLI@2
      displayName: 'Run Terraform Plan'
      inputs:
        azureSubscription: 'terraform-corpodev-sp'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        workingDirectory: '$(tfWorkingDir)'
        inlineScript: |

          echo "Current Directory:"
          pwd

          echo "Listing Files:"
          ls -la
          
          echo "Terraform Version:"
          terraform version

          echo "Running Terraform Init..."
          terraform init

          echo "Running Terraform Validate..."
          terraform validate

          echo "Running Terraform Plan..."
          terraform plan \
            -var-file="./dev.tfvars" \
            -out="corpodev-plan.tfplan"


    # -------------------------------------------------------------------------
    # Prepare tfplan for Publishing
    # -------------------------------------------------------------------------
    - task: Bash@3
      displayName: 'Prepare tfplan package'
      inputs:
        targetType: 'inline'
        script: |
          mkdir -p $(Build.ArtifactStagingDirectory)/tfplan

          cp $(tfWorkingDir)/corpodev-plan.tfplan \
            $(Build.ArtifactStagingDirectory)/tfplan/


    # -------------------------------------------------------------------------
    # Publish Terraform Plan in Artifacts Feed
    # -------------------------------------------------------------------------
    - task: UniversalPackages@1
      displayName: 'Publish tfplan to Azure Artifacts'
      inputs:
        command: 'publish'
        publishDirectory: '$(Build.ArtifactStagingDirectory)/tfplan'
        feedsToUsePublish: 'internal'
        vstsFeedPublish: 'terraform-artifacts'
        vstsFeedPackagePublish: 'corpodev-plan'
        versionOption: 'custom'
        versionPublish: '1.0.$(Build.BuildId)'